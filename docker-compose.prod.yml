version: '3.8'

services:
  # MongoDB - Producción
  mongodb:
    image: mongo:5.0
    container_name: peluqueria_mongodb_prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: peluqueria_saas
    volumes:
      - mongodb_data_prod:/data/db
      - mongodb_backup:/data/backup
    networks:
      - peluqueria_network
    healthcheck:
      test: echo 'db.auth("${MONGO_USER:-admin}", "${MONGO_PASSWORD:-changeme}")' | mongosh localhost
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend API - Producción
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: peluqueria_api_prod
    restart: always
    environment:
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/peluqueria_saas?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      PORT: 5000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - peluqueria_network
    expose:
      - "5000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Frontend - Producción
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: peluqueria_web_prod
    restart: always
    environment:
      VITE_API_URL: https://${DOMAIN:-api.example.com}/api
    networks:
      - peluqueria_network
    expose:
      - "80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: peluqueria_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
    depends_on:
      - api
      - web
    networks:
      - peluqueria_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Certbot para SSL (Letsencrypt)
  certbot:
    image: certbot/certbot:latest
    container_name: peluqueria_certbot
    volumes:
      - ./ssl:/etc/letsencrypt:rw
      - ./renewal-hooks:/etc/letsencrypt/renewal-hooks:rw
    command: renew --quiet --post-hook "docker exec peluqueria_nginx nginx -s reload"
    restart: always

volumes:
  mongodb_data_prod:
    driver: local
  mongodb_backup:
    driver: local

networks:
  peluqueria_network:
    driver: bridge
