version: '3.8'

services:
  # MongoDB
  mongodb:
    image: mongo:5.0
    container_name: peluqueria_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: peluqueria_saas
    volumes:
      - mongodb_data:/data/db
    networks:
      - peluqueria_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  api:
    image: node:18-alpine
    container_name: peluqueria_api
    working_dir: /app
    ports:
      - "5000:5000"
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://admin:admin123@mongodb:27017/peluqueria_saas?authSource=admin}
      JWT_SECRET: ${JWT_SECRET:-tu_secret_key_cambiar_en_produccion}
      JWT_EXPIRE: 7d
      PORT: 5000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - peluqueria_network
    restart: unless-stopped
    command: sh -c "npm install && npm run dev"

  # Frontend
  web:
    image: node:18-alpine
    container_name: peluqueria_web
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_API_URL_INTERNAL: http://api:5000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - peluqueria_network
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  mongodb_data:
    driver: local

networks:
  peluqueria_network:
    driver: bridge
